  <script>
    // ====================== AUTHENTICATION SYSTEM ======================
    let currentUser = null;
    const ADMIN_USERNAME = 'admin';
    const ADMIN_PASSWORD = '45thebest';

    // Initialize users in localStorage if not exists
    if (!localStorage.getItem('trioo_users')) {
      const defaultUsers = [
        { username: ADMIN_USERNAME, password: ADMIN_PASSWORD, isAdmin: true }
      ];
      localStorage.setItem('trioo_users', JSON.stringify(defaultUsers));
    }

    // Initialize server status
    if (!localStorage.getItem('trioo_server_status')) {
      localStorage.setItem('trioo_server_status', 'online');
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem('trioo_users') || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem('trioo_users', JSON.stringify(users));
    }

    function getServerStatus() {
      return localStorage.getItem('trioo_server_status') || 'online';
    }

    function setServerStatus(status) {
      localStorage.setItem('trioo_server_status', status);
      updateServerDisplay();
      checkServerAccess();
    }

    function signup() {
      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const errorDiv = document.getElementById('signup-error');
      const successDiv = document.getElementById('signup-success');

      errorDiv.textContent = '';
      successDiv.textContent = '';

      if (!username || !password) {
        errorDiv.textContent = 'Please fill in all fields';
        return;
      }

      if (password !== confirm) {
        errorDiv.textContent = 'Passwords do not match';
        return;
      }

      if (password.length < 4) {
        errorDiv.textContent = 'Password must be at least 4 characters';
        return;
      }

      const users = getUsers();
      if (users.find(u => u.username === username)) {
        errorDiv.textContent = 'Username already exists';
        return;
      }

      users.push({ username, password, isAdmin: false });
      saveUsers(users);
      
      successDiv.textContent = 'Account created successfully! Please login.';
      document.getElementById('signup-username').value = '';
      document.getElementById('signup-password').value = '';
      document.getElementById('signup-confirm').value = '';
    }

    function login() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');

      errorDiv.textContent = '';

      if (!username || !password) {
        errorDiv.textContent = 'Please enter username and password';
        return;
      }

      // Special check for admin
      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        currentUser = { username: ADMIN_USERNAME, isAdmin: true };
        localStorage.setItem('trioo_current_user', JSON.stringify(currentUser));
        showLoggedInState();
        // If server was offline, redirect to Power Panel automatically
        if (getServerStatus() === 'offline') {
          setTimeout(() => {
            goToPower();
            toggleDashboard();
          }, 500);
        }
        return;
      }

      const users = getUsers();
      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        currentUser = user;
        localStorage.setItem('trioo_current_user', JSON.stringify(currentUser));
        showLoggedInState();
      } else {
        errorDiv.textContent = 'Invalid username or password';
      }
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('trioo_current_user');
      showLoggedOutState();
      goToHome();
    }

    function showLoggedInState() {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('profile-section').style.display = 'block';
      document.getElementById('profile-username').textContent = currentUser.username;
      
      const typeDiv = document.getElementById('profile-type');
      if (currentUser.isAdmin) {
        typeDiv.textContent = 'Administrator';
        typeDiv.className = 'account-type admin';
        document.getElementById('power-link').classList.remove('hidden');
      } else {
        typeDiv.textContent = 'Standard User';
        typeDiv.className = 'account-type';
      }

      updateUserStatus();
    }

    function showLoggedOutState() {
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('profile-section').style.display = 'none';
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      document.getElementById('power-link').classList.add('hidden');
      updateUserStatus();
    }

    function updateUserStatus() {
      const statusDiv = document.getElementById('user-status');
      if (currentUser) {
        statusDiv.innerHTML = `
          <span>Logged in as <span class="username">${currentUser.username}</span></span>
          <button onclick="logout()" class="logout-btn">Logout</button>
        `;
      } else {
        statusDiv.innerHTML = '<span>Not logged in</span>';
      }
    }

    function checkExistingSession() {
      const saved = localStorage.getItem('trioo_current_user');
      if (saved) {
        currentUser = JSON.parse(saved);
        if (currentUser.username === ADMIN_USERNAME) {
          currentUser.isAdmin = true;
        }
        showLoggedInState();
      }
    }

    // ====================== SERVER CONTROL ======================
    function updateServerDisplay() {
      const status = getServerStatus();
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      
      if (status === 'online') {
        dot.className = 'status-indicator status-online';
        text.textContent = 'ONLINE';
        text.style.color = '#22c55e';
        document.getElementById('last-action').textContent = 'Server restored by admin';
      } else {
        dot.className = 'status-indicator status-offline';
        text.textContent = 'OFFLINE';
        text.style.color = '#ef4444';
        document.getElementById('last-action').textContent = 'Server shut down by admin';
      }
    }

    function shutdownServer() {
      if (!currentUser || !currentUser.isAdmin) {
        alert('Unauthorized: Admin access required');
        return;
      }
      setServerStatus('offline');
      alert('Server shut down successfully. Normal users are now locked out.');
    }

    function restoreServer() {
      if (!currentUser || !currentUser.isAdmin) {
        alert('Unauthorized: Admin access required');
        return;
      }
      setServerStatus('online');
      alert('Server restored successfully. All users can now access the platform.');
    }

    function checkServerAccess() {
      const status = getServerStatus();
      const overlay = document.getElementById('maintenance-overlay');
      
      // Only show maintenance if offline AND not admin
      if (status === 'offline' && (!currentUser || !currentUser.isAdmin)) {
        overlay.classList.add('active');
        // Auto-redirect non-admins to home (which will show maintenance)
        const currentPage = document.querySelector('.main-content > div[style*="block"], .main-content > div[style*="flex"]');
        if (currentPage && currentPage.id !== 'home-container') {
          hideAll();
          document.getElementById('home-container').style.display = 'block';
          setActiveLink('home-link');
        }
      } else {
        overlay.classList.remove('active');
      }
    }

    // ====================== CORE NAVIGATION ======================
    function hideAll() {
      const pages = ["home-container", "proxy-container", "ai-container", "game-container", "settings-container", "chat-container", "account-container", "power-container"];
      pages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });
      const results = document.getElementById("results");
      if (results) results.style.display = "none";
      const closeBtn = document.getElementById("closeBtn");
      if (closeBtn) closeBtn.style.display = "none";
    }

    function toggleDashboard() {
      const dashboard = document.getElementById("dashboard");
      const main = document.getElementById("main-content");
      if (dashboard && main) {
        dashboard.classList.toggle("open");
        main.classList.toggle("shifted");
      }
    }

    function setActiveLink(id) {
      document.querySelectorAll(".dashboard-item").forEach(link => link.classList.remove("active"));
      const link = document.getElementById(id);
      if (link) link.classList.add("active");
    }

    function isServerBlocking() {
      const status = getServerStatus();
      return status === 'offline' && (!currentUser || !currentUser.isAdmin);
    }

    function goToHome() { 
      hideAll(); 
      document.getElementById("home-container").style.display = "block"; 
      setActiveLink("home-link"); 
    }
    
    function goToProxy() { 
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      hideAll(); 
      document.getElementById("proxy-container").style.display = "block"; 
      setActiveLink("proxy-link"); 
      setTimeout(() => document.getElementById("searchInput").focus(), 100);
    }
    
    function goToAI() { 
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      hideAll(); 
      document.getElementById("ai-container").style.display = "flex"; 
      setActiveLink("ai-link"); 
    }
    
    function goToGame() { 
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      hideAll(); 
      document.getElementById("game-container").style.display = "flex"; 
      setActiveLink("game-link"); 
      initSnakeGame(); 
    }
    
    function goToSettings() { 
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      hideAll(); 
      document.getElementById("settings-container").style.display = "block"; 
      setActiveLink("settings-link"); 
    }
    
    function goToChat() { 
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      hideAll(); 
      document.getElementById("chat-container").style.display = "flex"; 
      setActiveLink("chat-link"); 
      loadChatRooms(); 
    }

    function goToAccount() { 
      // Account is ALWAYS accessible so users can login as admin
      hideAll(); 
      document.getElementById("account-container").style.display = "block"; 
      setActiveLink("account-link"); 
    }

    function goToPower() { 
      if (!currentUser || !currentUser.isAdmin) {
        alert('Access Denied: Admin privileges required');
        return;
      }
      hideAll(); 
      document.getElementById("power-container").style.display = "block"; 
      setActiveLink("power-link");
      updateServerDisplay();
    }

    // ====================== PROXY ======================
    let currentEngine = "bing";
    const engines = {
      bing: "https://www.bing.com/search?q=",
      google: "https://www.google.com/search?q=",
      ddg: "https://duckduckgo.com/?q="
    };

    document.querySelectorAll('.engine-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.engine-btn').forEach(b => {
          b.classList.remove('active');
          b.style.background = 'rgba(255,255,255,0.1)';
        });
        btn.classList.add('active');
        btn.style.background = '';
        currentEngine = btn.getAttribute('data-engine');
      });
    });

    function performSearch() {
      if (isServerBlocking()) return;
      const input = document.getElementById("searchInput");
      if (!input) return;
      let query = input.value.trim();
      if (!query) return;
      showResults(engines[currentEngine] + encodeURIComponent(query));
    }

    function goToURL() {
      if (isServerBlocking()) return;
      const input = document.getElementById("searchInput");
      if (!input) return;
      let url = input.value.trim();
      if (!url) return;
      if (!url.startsWith("http")) url = "https://" + url;
      showResults(url);
    }

    function showResults(src) {
      const frame = document.getElementById("results");
      if (frame) {
        frame.src = src;
        frame.style.display = "block";
      }
      const closeBtn = document.getElementById("closeBtn");
      if (closeBtn) closeBtn.style.display = "block";
    }

    function closeResults() {
      const frame = document.getElementById("results");
      if (frame) frame.style.display = "none";
      const closeBtn = document.getElementById("closeBtn");
      if (closeBtn) closeBtn.style.display = "none";
    }

    // ====================== MOUSE GLOWING PARTICLES ======================
    let particles = [];
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    function Particle() {
      this.x = mouseX; this.y = mouseY;
      this.size = Math.random() * 22 + 8;
      this.speedX = Math.random() * 4 - 2;
      this.speedY = Math.random() * 4 - 2;
      this.life = 95;
      this.color = `hsla(${200 + Math.random() * 80}, 100%, 85%, 0.9)`;
    }

    const canvas = document.getElementById("particle-canvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      if (canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    }

    function animateParticles() {
      if (!ctx) return;
      ctx.fillStyle = "rgba(10, 10, 46, 0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const dx = mouseX - p.x;
        const dy = mouseY - p.y;
        p.speedX += dx * 0.008;
        p.speedY += dy * 0.008;
        p.x += p.speedX; p.y += p.speedY;
        p.speedX *= 0.96; p.speedY *= 0.96;
        p.life -= 1.2; p.size *= 0.975;

        ctx.shadowBlur = 30;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0 || p.size < 0.5) particles.splice(i, 1);
      }
      requestAnimationFrame(animateParticles);
    }

    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (Math.random() > 0.6) for (let i = 0; i < 4; i++) particles.push(new Particle());
    });

    // ====================== BACKGROUND BUBBLES ======================
    function createBubbles() {
      const container = document.getElementById("bubbles");
      if (!container) return;
      for (let i = 0; i < 65; i++) {
        let bubble = document.createElement("span");
        let size = Math.random() * 45 + 15;
        bubble.style.width = size + "px";
        bubble.style.height = size + "px";
        bubble.style.left = Math.random() * 100 + "%";
        bubble.style.animationDuration = (8 + Math.random() * 20) + "s";
        bubble.style.animationDelay = Math.random() * 15 + "s";
        container.appendChild(bubble);
      }
    }

    // ====================== AI CHAT ======================
    function sendAIMessage() {
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      const input = document.getElementById('aiInput');
      const chatBox = document.getElementById('chatBox');
      if (!input || !input.value.trim()) return;
      
      // Add user message
      const userMsg = document.createElement('div');
      userMsg.className = 'message';
      userMsg.style.cssText = 'margin-bottom: 15px; text-align: right;';
      userMsg.innerHTML = `<div style="background: rgba(103,232,249,0.2); padding: 15px 20px; border-radius: 18px; display: inline-block; max-width: 80%; text-align: left;">${input.value}</div>`;
      chatBox.appendChild(userMsg);
      
      // Simulate AI response
      setTimeout(() => {
        const aiMsg = document.createElement('div');
        aiMsg.className = 'message ai';
        aiMsg.style.cssText = 'margin-bottom: 15px;';
        aiMsg.innerHTML = `<div style="background: rgba(192,132,252,0.2); padding: 15px 20px; border-radius: 18px; display: inline-block; max-width: 80%;">I'm a demo AI. You said: "${input.value}"</div>`;
        chatBox.appendChild(aiMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 500);
      
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Snake Game Implementation
    let snake = [];
    let food = {};
    let direction = 'right';
    let gameLoop = null;
    let score = 0;
    let gameInitialized = false;

    function initSnakeGame() {
      if (gameInitialized) return;
      const canvas = document.getElementById('snakeCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      snake = [{x: 10, y: 10}];
      food = {x: 15, y: 15};
      direction = 'right';
      score = 0;
      document.getElementById('snakeScore').textContent = score;
      
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(() => gameStep(ctx), 100);
      gameInitialized = true;
      
      document.addEventListener('keydown', handleSnakeInput);
    }

    function gameStep(ctx) {
      const canvas = document.getElementById('snakeCanvas');
      if (!ctx || !canvas) return;
      
      // Clear canvas
      ctx.fillStyle = '#0a0a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Move snake
      const head = {...snake[0]};
      if (direction === 'right') head.x++;
      if (direction === 'left') head.x--;
      if (direction === 'up') head.y--;
      if (direction === 'down') head.y++;
      
      // Check collision with walls
      if (head.x < 0 || head.x >= 22 || head.y < 0 || head.y >= 22) {
        resetSnakeGame();
        return;
      }
      
      // Check collision with self
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        resetSnakeGame();
        return;
      }
      
      snake.unshift(head);
      
      // Check food
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('snakeScore').textContent = score;
        food = {
          x: Math.floor(Math.random() * 22),
          y: Math.floor(Math.random() * 22)
        };
      } else {
        snake.pop();
      }
      
      // Draw food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * 20 + 10, food.y * 20 + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw snake
      ctx.fillStyle = '#67e8f9';
      snake.forEach((seg, i) => {
        ctx.shadowBlur = i === 0 ? 20 : 0;
        ctx.shadowColor = '#67e8f9';
        ctx.fillRect(seg.x * 20 + 2, seg.y * 20 + 2, 16, 16);
      });
      ctx.shadowBlur = 0;
    }

    function handleSnakeInput(e) {
      if (e.key === 'ArrowUp' && direction !== 'down') direction = 'up';
      if (e.key === 'ArrowDown' && direction !== 'up') direction = 'down';
      if (e.key === 'ArrowLeft' && direction !== 'right') direction = 'left';
      if (e.key === 'ArrowRight' && direction !== 'left') direction = 'right';
    }

    function resetSnakeGame() {
      gameInitialized = false;
      if (gameLoop) clearInterval(gameLoop);
      initSnakeGame();
    }

    function updateThemeColor(color) {
      document.documentElement.style.setProperty('--accent', color);
    }

    function updateSiteTitle() {
      const title = document.getElementById("site-title-input").value || "trioo";
      document.title = title;
    }

    function resetAllSettings() {
      if (confirm("Reset all settings? This will clear all accounts and server status.")) {
        localStorage.removeItem('trioo_users');
        localStorage.removeItem('trioo_current_user');
        localStorage.removeItem('trioo_server_status');
        location.reload();
      }
    }

    // Chat System
    let currentRoom = null;
    let chatInterval = null;

    function loadChatRooms() {
      const list = document.getElementById("room-list");
      if (!list) return;
      
      // Demo rooms
      list.innerHTML = `
        <div onclick="joinRoom('General')" style="padding: 12px; background: rgba(103,232,249,0.1); border-radius: 8px; margin-bottom: 8px; cursor: pointer; border-left: 3px solid var(--accent);">
          <div style="font-weight: 600;"># General</div>
          <div style="font-size: 12px; color: #94a3b8;">Public chat room</div>
        </div>
        <div onclick="joinRoom('Gaming')" style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; cursor: pointer;">
          <div style="font-weight: 600;"># Gaming</div>
          <div style="font-size: 12px; color: #94a3b8;">Talk about games</div>
        </div>
      `;
    }

    function joinRoom(name) {
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      currentRoom = name;
      document.getElementById('current-room-name').textContent = '#' + name;
      const messages = document.getElementById('chat-messages');
      messages.innerHTML = `<div style="text-align: center; color: #94a3b8; margin: 20px 0;">Welcome to #${name}!</div>`;
      
      // Simulate incoming messages
      if (chatInterval) clearInterval(chatInterval);
      chatInterval = setInterval(() => {
        if (Math.random() > 0.7 && !isServerBlocking()) {
          const users = ['Alice', 'Bob', 'Charlie', 'Diana'];
          const texts = ['Hello!', 'How is everyone?', 'This is cool!', 'Anyone there?'];
          const user = users[Math.floor(Math.random() * users.length)];
          const text = texts[Math.floor(Math.random() * texts.length)];
          
          const msg = document.createElement('div');
          msg.style.cssText = 'padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; max-width: 80%;';
          msg.innerHTML = `<strong style="color: var(--accent);">${user}:</strong> ${text}`;
          messages.appendChild(msg);
          messages.scrollTop = messages.scrollHeight;
        }
      }, 3000);
    }

    function createNewChatRoom() {
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      const name = prompt("New chat room name:", "My Room");
      if (name) {
        const list = document.getElementById("room-list");
        const div = document.createElement('div');
        div.onclick = () => joinRoom(name);
        div.style.cssText = 'padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; cursor: pointer;';
        div.innerHTML = `<div style="font-weight: 600;"># ${name}</div><div style="font-size: 12px; color: #94a3b8;">Private room</div>`;
        list.appendChild(div);
        joinRoom(name);
      }
    }

    function sendChatMessage() {
      if (isServerBlocking()) {
        alert('Server is under maintenance. Please wait or login as admin.');
        return;
      }
      const input = document.getElementById("chat-input");
      const messages = document.getElementById("chat-messages");
      if (input && input.value.trim() && messages) {
        const msg = document.createElement('div');
        msg.style.cssText = 'padding: 12px 16px; background: rgba(103,232,249,0.2); border-radius: 12px; max-width: 80%; align-self: flex-end; margin-left: auto;';
        const username = currentUser ? currentUser.username : 'Guest';
        msg.innerHTML = `<strong style="color: var(--accent);">${username}:</strong> ${input.value}`;
        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;
        input.value = "";
      }
    }

    function inviteToChat() {
      if (!currentRoom) {
        alert("Join a room first!");
        return;
      }
      const link = `${window.location.origin}/chat/${currentRoom}`;
      navigator.clipboard.writeText(link).then(() => {
        alert("Invite link copied to clipboard!");
      }).catch(() => {
        alert(`Share this link: ${link}`);
      });
    }

    // ====================== INIT ======================
    window.onload = function() {
      hideAll();
      goToHome();
      resizeCanvas();
      animateParticles();
      createBubbles();
      checkExistingSession();
      checkServerAccess();

      // Periodic check for server status
      setInterval(checkServerAccess, 2000);

      document.addEventListener("click", (e) => {
        const dashboard = document.getElementById("dashboard");
        const menuBtn = document.querySelector(".menu-btn");
        if (dashboard && menuBtn && !dashboard.contains(e.target) && !menuBtn.contains(e.target)) {
          dashboard.classList.remove("open");
          const main = document.getElementById("main-content");
          if (main) main.classList.remove("shifted");
        }
      });

      console.log("%c✅ trioo is now fully working - with Account & Admin Power Panel!", "color:#67e8f9; font-size:14px");
      console.log("%c🔑 Default Admin: username 'admin' | password '45thebest'", "color:#ef4444; font-size:12px");
    };
  </script>
